<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PolyEngine Simple Logo Variants</title>
  <style>
    body { margin: 0; padding: 24px; background: #00ff00; font-family: Arial, sans-serif; color: #111; }
    .grid { display: grid; gap: 24px; }
    .asset { background: #00ff00; border: 2px dashed #111; padding: 24px; }
    img { display: block; width: 100%; max-width: 1200px; height: auto; }
  </style>
</head>
<body>
  <h1>PolyEngine Simple Logo Variants</h1>
  <p>Green background is only for transparency checking. SVGs and PNG exports have transparent backgrounds.</p>
  <div class="grid">
    <div class="asset"><img src="./polyengine-variant-01.svg" alt="PolyEngine variant 01"></div>
    <div class="asset"><img src="./polyengine-variant-02.svg" alt="PolyEngine variant 02"></div>
    <div class="asset"><img src="./polyengine-variant-03.svg" alt="PolyEngine variant 03"></div>
    <div class="asset"><img src="./polyengine-variant-04.svg" alt="PolyEngine variant 04"></div>
    <div class="asset"><img src="./polyengine-variant-05.svg" alt="PolyEngine variant 05"></div>
  </div>
</body>
</html>
