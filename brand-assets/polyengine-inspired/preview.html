<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PolyEngine Inspired Logo</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #050609; font-family: Arial, sans-serif; }
    .stage { width: min(1200px, 92vw); display: grid; gap: 24px; justify-items: center; padding: 48px; }
    .card { width: 100%; background: radial-gradient(circle at 50% 28%, #111827 0, #050609 42%, #020307 100%); border: 1px solid #111827; border-radius: 12px; padding: 36px; box-shadow: 0 30px 120px rgba(0,0,0,.45); }
    img { display: block; width: 100%; height: auto; }
    .icon { width: 280px; margin: 0 auto 8px; }
  </style>
</head>
<body>
  <main class="stage">
    <section class="card"><img class="icon" src="./polyengine-inspired-icon.svg" alt="PolyEngine icon"></section>
    <section class="card"><img src="./polyengine-inspired-text.svg" alt="PolyEngine text"></section>
    <section class="card"><img src="./polyengine-inspired-lockup.svg" alt="PolyEngine lockup"></section>
  </main>
</body>
</html>
