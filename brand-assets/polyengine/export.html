<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PolyEngine Logo Export</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #00ff00; color: #111; padding: 24px; }
    .grid { display: grid; gap: 24px; }
    .asset { background: #00ff00; border: 2px dashed #111; padding: 24px; }
    img { max-width: 100%; height: auto; display: block; }
    p { max-width: 760px; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>PolyEngine Logo Export Check</h1>
  <p>The page background is green only for transparency checking. The SVG files themselves have no background. If exported as PNG with transparency enabled, the green should disappear.</p>
  <div class="grid">
    <div class="asset"><img src="./polyengine-icon.svg" alt="PolyEngine icon"></div>
    <div class="asset"><img src="./polyengine-text.svg" alt="PolyEngine text logo"></div>
    <div class="asset"><img src="./polyengine-lockup.svg" alt="PolyEngine icon and text logo"></div>
  </div>
</body>
</html>
