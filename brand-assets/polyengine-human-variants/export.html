<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PolyEngine Human Logo Variants</title>
  <style>
    body { margin: 0; padding: 24px; background: #00ff00; font-family: Arial, sans-serif; color: #111; }
    .grid { display: grid; gap: 24px; }
    .asset { background: #00ff00; border: 2px dashed #111; padding: 20px; }
    .row { display: grid; grid-template-columns: 180px 1fr; gap: 18px; align-items: center; }
    img { display: block; width: 100%; height: auto; }
  </style>
</head>
<body>
  <h1>PolyEngine Human Logo Variants</h1>
  <p>Green background is only for transparency checking. Source SVGs and exported PNGs are transparent.</p>
  <div class="grid">
    <div class="asset row"><img src="./polyengine-human-01-icon.svg"><img src="./polyengine-human-01-lockup.svg"></div>
    <div class="asset row"><img src="./polyengine-human-02-icon.svg"><img src="./polyengine-human-02-lockup.svg"></div>
    <div class="asset row"><img src="./polyengine-human-03-icon.svg"><img src="./polyengine-human-03-lockup.svg"></div>
    <div class="asset row"><img src="./polyengine-human-04-icon.svg"><img src="./polyengine-human-04-lockup.svg"></div>
    <div class="asset row"><img src="./polyengine-human-05-icon.svg"><img src="./polyengine-human-05-lockup.svg"></div>
  </div>
</body>
</html>
